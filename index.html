<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Flow Batch Generator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:20px;
    }

    .container{
      max-width:900px;
      margin:auto;
      background:#1e293b;
      padding:25px;
      border-radius:16px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#38bdf8;
    }

    textarea{
      width:100%;
      min-height:120px;
      background:#0f172a;
      color:white;
      border:1px solid #334155;
      border-radius:10px;
      padding:12px;
      margin-top:10px;
      margin-bottom:20px;
    }

    button{
      border:none;
      padding:12px 18px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      margin-right:10px;
      margin-bottom:10px;
    }

    .login-btn{
      background:#22c55e;
      color:white;
    }

    .generate-btn{
      background:#38bdf8;
      color:black;
    }

    .clear-btn{
      background:#ef4444;
      color:white;
    }

    .result{
      margin-top:20px;
      background:#0f172a;
      border:1px solid #334155;
      padding:15px;
      border-radius:10px;
      max-height:400px;
      overflow:auto;
    }

    .item{
      border-bottom:1px solid #334155;
      padding:10px 0;
    }

    .token-box{
      background:black;
      color:#22c55e;
      padding:10px;
      border-radius:8px;
      word-break:break-all;
      margin-top:10px;
      font-size:12px;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Google Flow Batch Generator</h1>

  <button class="login-btn" onclick="loginGoogle()">
    Login Google & Ambil Token
  </button>

  <div class="token-box" id="tokenBox">
    Token belum tersedia...
  </div>

  <textarea id="promptInput" placeholder="1 prompt per baris..."></textarea>

  <button class="generate-btn" onclick="generateBatch()">
    Generate Batch
  </button>

  <button class="clear-btn" onclick="clearAll()">
    Clear
  </button>

  <div class="result" id="resultBox">
    Hasil batch akan muncul di sini...
  </div>

</div>

<script>

function loginGoogle(){

  const clientId =
    "CLIENT_ID_KAMU";

  const redirectUri =
    "https://geneis.netlify.app";

  const scope =
    "openid email profile";

  const authUrl =
    "https://accounts.google.com/o/oauth2/v2/auth" +
    "?client_id=" + encodeURIComponent(clientId) +
    "&redirect_uri=" + encodeURIComponent(redirectUri) +
    "&response_type=token" +
    "&scope=" + encodeURIComponent(scope) +
    "&prompt=consent";

  window.location.href = authUrl;
}

</script>

</body>
</html>
